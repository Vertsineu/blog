name: Publish Toolchain

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag that stores the prebuilt tools.
        required: true
        default: blog-toolchain-linux-amd64
      hugo_ref:
        description: Vertsineu/hugo branch, tag, or ref to build.
        required: true
        default: support-typst
      typst_version:
        description: typst-cli release version to install.
        required: true
        default: '0.14.2'

permissions:
  contents: write

jobs:
  build-linux-amd64:
    name: Build Linux amd64 toolchain
    runs-on: ubuntu-22.04
    env:
      HUGO_REF: ${{ inputs.hugo_ref }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      RELEASE_TITLE: Blog toolchain (${{ inputs.release_tag }})
      RELEASE_NOTES: Prebuilt Hugo and Typst binaries for the blog deployment workflow.
      TYPST_VERSION: ${{ inputs.typst_version }}
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build Hugo
        shell: bash
        run: |
          set -euo pipefail

          git clone --depth 1 --branch "$HUGO_REF" "https://github.com/Vertsineu/hugo.git" "$RUNNER_TEMP/custom-hugo"
          cd "$RUNNER_TEMP/custom-hugo"

          mkdir -p "$RUNNER_TEMP/toolchain/bin"
          CGO_ENABLED=1 go build -tags extended -trimpath -ldflags="-s -w" -o "$RUNNER_TEMP/toolchain/bin/hugo" .
          "$RUNNER_TEMP/toolchain/bin/hugo" version

      - name: Build Typst
        shell: bash
        run: |
          set -euo pipefail

          cargo install typst-cli --version "$TYPST_VERSION" --locked --root "$RUNNER_TEMP/typst-root"

          mkdir -p "$RUNNER_TEMP/toolchain/bin"
          install -m 0755 "$RUNNER_TEMP/typst-root/bin/typst" "$RUNNER_TEMP/toolchain/bin/typst"
          "$RUNNER_TEMP/toolchain/bin/typst" --version

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/hugo-linux-amd64/bin dist/typst-linux-amd64/bin
          cp "$RUNNER_TEMP/toolchain/bin/hugo" dist/hugo-linux-amd64/bin/
          cp "$RUNNER_TEMP/toolchain/bin/typst" dist/typst-linux-amd64/bin/

          tar -C dist/hugo-linux-amd64 -czf dist/hugo-linux-amd64.tar.gz bin/hugo
          tar -C dist/typst-linux-amd64 -czf dist/typst-linux-amd64.tar.gz bin/typst

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TITLE"
            gh release upload "$RELEASE_TAG" dist/hugo-linux-amd64.tar.gz dist/typst-linux-amd64.tar.gz --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" dist/hugo-linux-amd64.tar.gz dist/typst-linux-amd64.tar.gz --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TITLE" --notes "$RELEASE_NOTES"
          fi
