name: Deploy Hugo Site

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TOOLCHAIN_RELEASE_TAG: blog-toolchain-linux-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install prebuilt Hugo and Typst
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/blog-toolchain"
          gh release download "$TOOLCHAIN_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "hugo-linux-amd64.tar.gz" \
            --pattern "typst-linux-amd64.tar.gz" \
            --dir "$RUNNER_TEMP/blog-toolchain"

          tar -xzf "$RUNNER_TEMP/blog-toolchain/hugo-linux-amd64.tar.gz" -C "$RUNNER_TEMP/blog-toolchain"
          tar -xzf "$RUNNER_TEMP/blog-toolchain/typst-linux-amd64.tar.gz" -C "$RUNNER_TEMP/blog-toolchain"

          echo "$RUNNER_TEMP/blog-toolchain/bin" >> "$GITHUB_PATH"

          "$RUNNER_TEMP/blog-toolchain/bin/hugo" version
          "$RUNNER_TEMP/blog-toolchain/bin/typst" --version

      - name: Build site
        run: |
          hugo --gc --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
